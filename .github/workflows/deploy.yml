name: Deploy to EC2

# Runs on every push to main, or manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 1. Fail fast if the code is broken, before touching the server
  check:
    name: Sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile + import
        run: |
          python -m py_compile app.py auth.py s3_service.py
          DEMO_MODE=true SECRET_KEY=ci python -c "import app; print('import OK')"

  # 2. Deploy: pull latest on the box and rebuild the container
  deploy:
    name: Deploy to EC2
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Pull + rebuild on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: ENV_FILE
          script: |
            set -e
            REPO_DIR=~/Video-portal
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/namanjain221995/Video-portal.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch --all --quiet
            git reset --hard origin/main

            # Optional: if you set a repo secret named ENV_FILE, refresh .env from it.
            # If ENV_FILE is unset/empty, the .env already on the box is used as-is.
            if [ -n "$ENV_FILE" ]; then
              printf '%s' "$ENV_FILE" > .env
              chmod 600 .env
            fi

            if [ ! -f .env ]; then
              echo "ERROR: .env is missing on the server. Create it once (see DEPLOY.md) or set the ENV_FILE secret."
              exit 1
            fi

            docker compose up -d --build
            docker image prune -f
            docker compose ps
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}