# Optional: put nginx in front of gunicorn (port 80 -> 8000), allow large zips.
# Save as /etc/nginx/sites-available/recording-portal, then:
#   sudo ln -s /etc/nginx/sites-available/recording-portal /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;            # or your domain / EC2 public DNS

    # Bulk zips can be large — don't let nginx cap the response.
    client_max_body_size 50m;
    proxy_max_temp_file_size 0;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # bulk download streaming
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
