# Run the whole portal in one command:
#     docker compose up -d --build
#
# Stop:        docker compose down
# Logs:        docker compose logs -f
# Rebuild:     docker compose up -d --build
#
# Edit .env first (cp .env.example .env). For 2-4 users the defaults are fine.

services:
  portal:
    build: .
    image: recording-portal:latest
    container_name: recording-portal
    restart: unless-stopped

    # Loads SECRET_KEY, ADMIN_USERS, S3_BUCKET_NAME, AWS_REGION, DEMO_MODE, etc.
    env_file:
      - .env

    # Keep created users on a persistent volume (survives rebuilds/restarts).
    environment:
      USERS_FILE: /data/users.json
      # Shared parsed S3 index on the persistent volume: workers load it instead
      # of each re-listing the bucket, and it survives restarts.
      INDEX_FILE: /data/index.json

    # host:container — the app listens on 8000 inside the container. Change the
    # LEFT number to whatever host port is free (80 for http://<ec2-ip>/ , etc.).
    # 8080 was taken by another process locally, so we use 8081.
    ports:
      - "8080:8000"

    volumes:
      - portal-data:/data
      # For LOCAL testing against the REAL bucket (DEMO_MODE=false), you can
      # share your AWS CLI creds instead of using an EC2 role — uncomment:
      # - ~/.aws:/root/.aws:ro

volumes:
  portal-data:
